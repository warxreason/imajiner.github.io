    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; color: #000000; min-height: 100vh; display: flex; flex-direction: column; font-family: "Datatype", sans-serif; }
        header { padding: 40px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 100; }

        nav a { text-decoration: none; color: #000000; font-size: 14px; }
        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 0 40px; position: relative; }
        .info-text { position: absolute; left: 40px; line-height: 1.6; max-width: 1000px; z-index: 20; }
        .info-photo { width: 300px; height: auto; display: block; z-index: 10; }
        footer { padding: 40px; display: flex; justify-content: center; align-items: center; font-size: 11px; text-transform: uppercase; z-index: 100; flex-wrap: wrap; }
        footer a { color: #000000; text-decoration: none; margin: 0 10px; }
        .divider { color: #cccccc; }
        @media (max-width: 600px) {
            header { padding: 20px; }
            .container { flex-direction: column; padding: 40px 20px; text-align: center; }
            .info-text { position: static; order: 2; margin-top: 20px; font-size: 14px; }
            .info-photo { width: 180px; order: 1; }
            footer { padding: 30px 20px; gap: 10px; }
        }
