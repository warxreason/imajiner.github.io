<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Info</title>
    <style>
        @font-face {
            font-family: 'Datatype';
            src: url('https://franktisellano.github.io/datatype/fonts/Datatype-Regular.woff2') format('woff2');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #ffffff;
            color: #000000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Datatype', monospace;
        }

        header {
            padding: 40px;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            position: relative;
            z-index: 100;
        }

        .site-logo { width: 32px; height: auto; display: block; }

        nav { display: flex; gap: 30px; }
        nav a {
            text-decoration: none;
            color: #000000;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        nav a:hover { opacity: 0.5; text-decoration: underline; }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .info-text {
            position: absolute;
            left: 40px;
            text-align: left;
            line-height: 1.6;
            font-size: 16px;
            max-width: 1000px;
            z-index: 20;
        }

        /* imajiner styling */
        .i-special { 
            font-family: 'Times New Roman', serif; 
            font-style: normal; 
            font-size: 1.2em; /* Increased size for the letter 'i' */
            line-height: 0;  /* Prevents the larger letter from pushing the line height up */
            vertical-align: 0em; /* Fine-tunes the baseline alignment */
        } 
        
        .majiner-special { font-family: 'Helvetica', Arial, sans-serif; font-weight: normal; }

        .info-photo {
            width: 140px; 
            height: auto;
            display: block;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .info-photo:hover {
            opacity: 0.8;
        }

        footer { padding: 40px; text-align: center; font-size: 11px; text-transform: uppercase; }
        footer a { color: #000000; text-decoration: none; }
        .divider { color: #cccccc; margin: 0 5px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html"><img src="imajinerdot.png" alt="Logo" class="site-logo"></a>
        <nav>
            <a href="info.html" style="text-decoration: underline;">INFO</a>
            <a href="mailto:juanfilbert24@gmail.com">CONTACT</a>
        </nav>
    </header>

    <div class="container">
        <div class="info-text">
            <p>Pekalongan origin from '09</p>
            <p>Founder of <span class="i-special">i</span><span class="majiner-special">majiner</span> est. 2025.</p>
            <p>Producer, writer, director, artist, and musician.</p>
        </div>

        <img src="Fotosutradaralow.png" alt="Foto Sutradara" class="info-photo">
    </div>

    <footer>
        <a href="https://x.com/warxreason" target="_blank">TWITTER</a>
        <span class="divider">/</span>
        <a href="https://www.instagram.com/jfe.ig/" target="_blank">INSTAGRAM</a>
        <span class="divider">/</span>
        <a href="https://www.youtube.com/@jfeat_" target="_blank">YOUTUBE</a>
    </footer>

</body>
</html>
