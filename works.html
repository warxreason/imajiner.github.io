<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works - Portfolio</title>
    <script src="https://unpkg.com/draggabilly@3/dist/draggabilly.pkgd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; color: #000000; min-height: 100vh; display: flex; flex-direction: column; font-family: "Datatype", sans-serif; overflow: hidden; }
        header { padding: 40px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 100; }
        .site-logo { width: 32px; height: auto; transition: opacity 0.3s; }
        .site-logo:hover { opacity: 0.6; }
        nav { display: flex; gap: 30px; }
        nav a { text-decoration: none; color: #000000; font-size: 14px; }
        #canvas { flex: 1; position: relative; width: 100%; height: 100%; }
        .work-item { width: 80px; cursor: grab; position: absolute; z-index: 50; touch-action: none; }
        .work-item:active { cursor: grabbing; }
        .work-item a { display: block; text-decoration: none; -webkit-user-drag: none; }
        .work-item img { width: 100%; height: auto; display: block; -webkit-user-drag: none; user-select: none; }
        footer { padding: 40px; display: flex; justify-content: center; align-items: center; font-size: 11px; text-transform: uppercase; z-index: 100; flex-wrap: wrap; gap: 10px; }
        footer a { color: #000000; text-decoration: none; }
        .divider { color: #cccccc; display: inline; margin: 0 10px; }
        @media (max-width: 600px) {
            header { padding: 20px; }
            .work-item { width: 60px; }
            footer { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="imajinerdot.png" alt="Logo" class="site-logo"></a>
        <nav><a href="info.html">INFO</a><a href="mailto:juanfilbert24@gmail.com">CONTACT</a></nav>
    </header>
    <div id="canvas">
        <div class="work-item" id="doc" style="top: 20%; left: 30%;"><a href="bibliography.html"><img src="24069-256x256x32.png" alt="Documents"></a></div>
        <div class="work-item" id="music" style="top: 50%; left: 60%;"><a href="https://jfeat.bandcamp.com" target="_blank"><img src="23998-256x256x32.png" alt="Discography"></a></div>
        <div class="work-item" id="film" style="top: 30%; left: 70%;"><a href="filmography.html"><img src="23999-256x256x32.png" alt="Filmography"></a></div>
    </div>
    <footer>
        <a href="https://x.com/warxreason" target="_blank">TWITTER</a><span class="divider">/</span>
        <a href="https://www.instagram.com/jfe.ig/" target="_blank">INSTAGRAM</a><span class="divider">/</span>
        <a href="https://www.youtube.com/@jfeat_" target="_blank">YOUTUBE</a>
    </footer>
    <script>
        const items = document.querySelectorAll('.work-item');
        items.forEach(item => {
            let draggie = new Draggabilly(item, { containment: '#canvas' });
            let link = item.querySelector('a');
            draggie.on('dragStart', () => { link.style.pointerEvents = 'none'; });
            draggie.on('dragEnd', () => { setTimeout(() => { link.style.pointerEvents = 'auto'; }, 50); });
        });
    </script>
</body>
</html>
