<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bibliography</title>
    
    <script src="https://unpkg.com/draggabilly@3/dist/draggabilly.pkgd.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: "Datatype", sans-serif;
            font-optical-sizing: auto;
            overflow: hidden; 
        }

        header {
            padding: 40px;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            position: relative;
            z-index: 100;
        }

        .site-logo {
            width: 32px;
            height: auto;
            display: block;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .site-logo:hover { opacity: 0.6; }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #000000;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        nav a:hover { 
            opacity: 0.5; 
            text-decoration: underline;
        }

        #canvas {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .draggable-folder {
            width: 80px; 
            cursor: grab;
            position: absolute;
            /* Random positioning handled by JS */
            z-index: 50;
            touch-action: none; 
        }

        .draggable-folder:active {
            cursor: grabbing;
        }

        .draggable-folder img {
            width: 100%;
            height: auto;
            display: block;
            -webkit-user-drag: none;
            user-select: none;
        }

        footer {
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            color: #000000;
            text-transform: uppercase;
            z-index: 100;
        }

        footer a {
            color: #000000;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        footer a:hover { opacity: 0.5; }

        .divider {
            color: #cccccc;
            margin: 0 10px;
        }

        @media (max-width: 600px) {
            header { padding: 20px; }
            footer {
                flex-wrap: wrap;
                padding: 30px 20px;
                gap: 15px;
            }
            .divider { display: none; }
            .draggable-folder { width: 60px; }
        }
    </style>
</head>

    <script>
        // Random placement logic
        const folder = document.getElementById('folder');
        const canvas = document.getElementById('canvas');
        
        function setRandomPosition() {
            const canvasRect = canvas.getBoundingClientRect();
            const folderWidth = folder.offsetWidth || 80;
            const folderHeight = folder.offsetHeight || 100;
            
            const maxX = canvasRect.width - folderWidth;
            const maxY = canvasRect.height - folderHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            folder.style.left = randomX + 'px';
            folder.style.top = randomY + 'px';
        }

        // Run after load to ensure dimensions are known
        window.addEventListener('load', setRandomPosition);

        var draggie = new Draggabilly('#folder', {
            containment: '#canvas'
        });

        var folderLink = document.querySelector('#folder a');

        draggie.on('dragStart', function() {
            folderLink.style.pointerEvents = 'none';
        });
        draggie.on('dragEnd', function() {
            setTimeout(() => {
                folderLink.style.pointerEvents = 'auto';
            }, 50);
        });
    </script>
