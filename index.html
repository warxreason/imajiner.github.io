<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12349 Portfolio</title>
    <script src="https://unpkg.com/draggabilly@3/dist/draggabilly.pkgd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; color: #000000; min-height: 100vh; display: flex; flex-direction: column; font-family: "Datatype", sans-serif; overflow: hidden; }
        header { padding: 40px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 100; }
        .site-logo { width: 32px; height: auto; display: block; }
        nav { display: flex; gap: 30px; }
        nav a { text-decoration: none; color: #000000; font-size: 14px; }
        #canvas { flex: 1; position: relative; width: 100%; height: 100%; }
        .draggable-folder { width: 80px; cursor: grab; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; touch-action: none; }
        .draggable-folder img { width: 100%; height: auto; user-select: none; -webkit-user-drag: none; }
        footer { padding: 40px; display: flex; justify-content: center; align-items: center; font-size: 11px; text-transform: uppercase; z-index: 100; flex-wrap: wrap; }
        footer a { color: #000000; text-decoration: none; margin: 0 10px; }
        .divider { color: #cccccc; }
        @media (max-width: 600px) {
            header { padding: 20px; }
            .draggable-folder { width: 60px; }
            footer { padding: 30px 20px; gap: 10px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="imajinerdot.png" alt="Logo" class="site-logo"></a>
        <nav><a href="info.html">INFO</a><a href="mailto:juanfilbert24@gmail.com">CONTACT</a></nav>
    </header>
    <div id="canvas">
        <div class="draggable-folder" id="folder">
            <a href="works.html"><img src="23984-256x256x32.png" alt="Portfolio Folder"></a>
        </div>
    </div>
    <footer>
        <a href="https://x.com/warxreason" target="_blank">TWITTER</a><span class="divider">/</span>
        <a href="https://www.instagram.com/jfe.ig/" target="_blank">INSTAGRAM</a><span class="divider">/</span>
        <a href="https://www.youtube.com/@jfeat_" target="_blank">YOUTUBE</a>
    </footer>
    <script>
        var draggie = new Draggabilly('#folder', { containment: '#canvas' });
        var folderLink = document.querySelector('#folder a');
        draggie.on('dragStart', () => { folderLink.style.pointerEvents = 'none'; });
        draggie.on('dragEnd', () => { setTimeout(() => { folderLink.style.pointerEvents = 'auto'; }, 50); });
    </script>
</body>
</html>
