<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12349 Portfolio</title>
    
    <style>
        /* Import Datatype Font */
        @font-face {
            font-family: 'Datatype';
            src: url('https://franktisellano.github.io/datatype/fonts/Datatype-Regular.woff2') format('woff2'),
                 url('https://franktisellano.github.io/datatype/fonts/Datatype-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Datatype', monospace;
        }

        /* Top Header Section */
        header {
            padding: 40px;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            position: relative;
            z-index: 100;
        }

        /* Top Left Image Logo */
        .site-logo {
            width: 32px;
            height: auto;
            display: block;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .site-logo:hover {
            opacity: 0.6;
        }

        /* Navigation Links */
        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #000000;
            font-family: 'Datatype', monospace;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        nav a:hover { 
            opacity: 0.5; 
            text-decoration: underline;
        }

        /* Center Content Area */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .portfolio-dropdown {
            position: relative;
            display: inline-block;
        }

        /* Folder Button Styling */
        .folder-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
        }

        .folder-btn img {
            width: 140px; 
            height: auto;
            display: block;
        }

        /* Dropdown Menu Styling */
        .dropdown-content {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            top: 110%; 
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background-color: #ffffff;
            min-width: 200px;
            z-index: 10;
            text-align: center;
            padding: 10px 0;
            transition: all 0.3s ease;
        }

        .dropdown-content a {
            color: #000000;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-family: 'Datatype', monospace;
            font-size: 20px;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .dropdown-content a:hover {
            opacity: 0.5;
            text-decoration: underline;
        }

        /* Interaction States */
        .portfolio-dropdown:hover .dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .portfolio-dropdown:hover .folder-btn {
            transform: scale(1.1);
        }

        /* Bottom Footer */
        footer {
            padding: 40px;
            text-align: center;
            font-family: 'Datatype', monospace;
            font-size: 11px;
            color: #000000;
            text-transform: uppercase;
        }

        footer a {
            color: #000000;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        footer a:hover {
            opacity: 0.5;
        }

        .divider {
            color: #cccccc;
            margin: 0 5px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="imajinerdot.png" alt="Logo" class="site-logo">
        </a>
        <nav>
            <a href="info.html">INFO</a>
            <a href="mailto:juanfilbert24@gmail.com">CONTACT</a>
        </nav>
    </header>

    <div class="container">
        <div class="portfolio-dropdown">
            <button class="folder-btn">
                <img src="Windows_11_FOLDER.png" alt="Portfolio Folder">
            </button>
            <div class="dropdown-content">
                <a href="#">FILMOGRAPHY</a>
                <a href="https://jfeat.bandcamp.com" target="_blank">DISCOGRAPHY</a>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://x.com/warxreason" target="_blank">TWITTER</a>
        <span class="divider">/</span>
        <a href="https://www.instagram.com/jfe.ig/" target="_blank">INSTAGRAM</a>
        <span class="divider">/</span>
        <a href="https://www.youtube.com/@jfeat_" target="_blank">YOUTUBE</a>
    </footer>

</body>
</html>
