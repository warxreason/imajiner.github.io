<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Portfolio</title>
    <script src="https://unpkg.com/draggabilly@3/dist/draggabilly.pkgd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #ffffff; color: #000000; min-height: 100vh; display: flex; flex-direction: column; font-family: "Datatype", sans-serif; overflow: hidden; }
        header { padding: 40px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 100; }
        .site-logo { width: 32px; height: auto; }
        nav { display: flex; gap: 30px; }
        nav a { text-decoration: none; color: #000000; font-size: 14px; }
        #canvas { flex: 1; position: relative; width: 100%; height: 100%; }
        .draggable-item { position: absolute; cursor: grab; z-index: 50; touch-action: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .draggable-item img { max-width: 300px; height: auto; display: block; -webkit-user-drag: none; user-select: none; }
        footer { padding: 40px; display: flex; justify-content: center; align-items: center; font-size: 11px; text-transform: uppercase; z-index: 100; flex-wrap: wrap; gap: 10px; }
        footer a { color: #000000; text-decoration: none; }
        .divider { color: #cccccc; display: inline; margin: 0 10px; }
        @media (max-width: 600px) { header { padding: 20px; } footer { padding: 30px 20px; } .draggable-item img { max-width: 90vw; } }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="imajinerdot.png" alt="Logo" class="site-logo"></a>
        <nav><a href="info.html">INFO</a><a href="mailto:juanfilbert24@gmail.com">CONTACT</a></nav>
    </header>
    <div id="canvas">
        <div class="draggable-item"><img src="dbsfpytsbts01.jpg" alt="BTS 01"></div>
        <div class="draggable-item"><img src="dbsfpytsbts02.jpg" alt="BTS 02"></div>
        <div class="draggable-item"><img src="dbsfpytsbts03.jpg" alt="BTS 03"></div>
    </div>
    <footer>
        <a href="https://x.com/warxreason" target="_blank">TWITTER</a><span class="divider">/</span>
        <a href="https://www.instagram.com/jfe.ig/" target="_blank">INSTAGRAM</a><span class="divider">/</span>
        <a href="https://www.youtube.com/@jfeat_" target="_blank">YOUTUBE</a>
    </footer>
    <script>
        const canvas = document.getElementById('canvas');
        document.querySelectorAll('.draggable-item').forEach(item => {
            const randomX = Math.floor(Math.random() * (canvas.clientWidth - 200));
            const randomY = Math.floor(Math.random() * (canvas.clientHeight - 200));
            item.style.left = randomX + 'px';
            item.style.top = randomY + 'px';
            new Draggabilly(item, { containment: '#canvas' });
        });
    </script>
</body>
</html>
